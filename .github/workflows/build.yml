name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Unzip project
        run: unzip StudyReminderV2_SourceCode.zip
      - name: Build APK
        run: |
          cd StudyReminderV2
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: StudyReminder-APK
          path: StudyReminderV2/app/build/outputs/apk/debug/app-debug.apk
